services:
  - type: web
    name: stockfolio-market-data
    runtime: python
    rootDir: services/market-data
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
